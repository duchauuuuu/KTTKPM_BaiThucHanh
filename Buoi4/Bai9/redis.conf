# ==============================
# Cấu hình Redis tùy chỉnh
# ==============================

# Bind address - lắng nghe trên tất cả các interface
bind 0.0.0.0

# Cổng Redis
port 6379

# Yêu cầu mật khẩu khi kết nối
requirepass myredispassword

# Số lượng database tối đa
databases 16

# Lưu dữ liệu vào disk theo các điều kiện:
# Lưu mỗi 900 giây nếu có ít nhất 1 key thay đổi
save 900 1
# Lưu mỗi 300 giây nếu có ít nhất 10 key thay đổi
save 300 10
# Lưu mỗi 60 giây nếu có ít nhất 10000 key thay đổi
save 60 10000

# Đường dẫn lưu file dump.rdb
dir /data

# Giới hạn bộ nhớ tối đa cho Redis
maxmemory 128mb

# Chiến lược khi bộ nhớ đầy: xóa các key ít được dùng nhất
maxmemory-policy allkeys-lru

# Bật chế độ append-only để tăng độ bền dữ liệu
appendonly yes
appendfilename "appendonly.aof"

# Mức độ ghi AOF: everysec = ghi mỗi giây (cân bằng giữa hiệu năng và an toàn)
appendfsync everysec

# Log level
loglevel notice
